<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Invoice-Gen</title>
  <meta name="description" content="The page you're looking for doesn't exist. Head back to Invoice-Gen to create your free professional invoices." />
  <meta name="robots" content="noindex, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom Styling -->
  <style>
    :root {
      --color-primary: #155EEF;
      --color-primary-hover: #2E72FF;
      --color-text-main: #0F172A;
      --color-text-secondary: #475569;
      --color-border: #E2E8F0;
      --color-bg: #FAFCFF;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-main);
      background-color: var(--color-bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header Nav */
    header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      display: flex;
      align-items: center;
    }

    .nav-container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      color: var(--color-text-main);
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #2E72FF 0%, #155EEF 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon::after {
      content: '';
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 2px;
    }

    /* Hero Section */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .error-container {
      max-width: 600px;
      width: 100%;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #2E72FF 0%, #155EEF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-text-main);
      margin-bottom: 16px;
    }

    .error-description {
      font-size: 1.125rem;
      color: var(--color-text-secondary);
      margin-bottom: 40px;
    }

    .action-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 4px 12px rgba(21, 94, 239, 0.2);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(21, 94, 239, 0.25);
    }

    .btn-secondary {
      background: white;
      color: var(--color-text-main);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: #F1F5F9;
      border-color: #CBD5E1;
    }

    /* Footer */
    footer {
      background: white;
      border-top: 1px solid var(--color-border);
      padding: 40px 24px;
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  
  <header>
    <div class="nav-container">
      <a href="/" class="logo-link">
        <div class="logo-icon"></div>
        Invoice-Gen
      </a>
      <a href="/" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.875rem;">Create Invoice</a>
    </div>
  </header>

  <main>
    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-description">
        We can't seem to find the page you're looking for. It might have been removed, renamed, or temporarily unavailable.
      </p>
      
      <div class="action-links">
        <a href="/" class="btn btn-primary">Go to Homepage</a>
        <a href="/templates/" class="btn btn-secondary">Browse Templates</a>
        <a href="/blog/" class="btn btn-secondary">Read Our Blog</a>
      </div>
    </div>
  </main>

  <footer>
    <div style="max-width: 1000px; margin: 0 auto;">
      &copy; 2026 Invoice-Gen. All rights reserved.
    </div>
  </footer>

</body>
</html>
