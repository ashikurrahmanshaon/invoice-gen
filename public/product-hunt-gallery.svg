<svg width="1270" height="760" viewBox="0 0 1270 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="24" stdDeviation="48" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <rect width="1270" height="760" fill="#F8FAFC"/>
  
  <g transform="translate(35, 65)">
    <rect x="200" y="65" width="800" height="560" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
    
    <!-- App Header -->
    <circle cx="224" cy="91" r="6" fill="#CBD5E1"/>
    <circle cx="244" cy="91" r="6" fill="#CBD5E1"/>
    <circle cx="264" cy="91" r="6" fill="#CBD5E1"/>
    
    <!-- Logo inside header -->
    <g transform="translate(480, 75)">
      <rect width="32" height="32" rx="8" fill="#2563EB"/>
      <rect x="10" y="8" width="12" height="16" rx="2" fill="#FFFFFF"/>
      <rect x="13" y="12" width="6" height="2" rx="1" fill="#2563EB"/>
      <rect x="13" y="16" width="4" height="2" rx="1" fill="#2563EB"/>
      <text x="42" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="18" fill="#0F172A" letter-spacing="-0.03em">Invoice-Gen</text>
    </g>

    <line x1="200" y1="121" x2="1000" y2="121" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Editor Layout Mockup -->
    <!-- Main Editor Area -->
    <rect x="232" y="153" width="480" height="500" rx="0" fill="#FFFFFF"/>
    
    <!-- Business Info Card -->
    <rect x="232" y="153" width="464" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="256" y="177" width="80" height="72" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="352" y="185" width="200" height="24" rx="4" fill="#F8FAFC"/>
    <rect x="352" y="217" width="320" height="24" rx="4" fill="#F8FAFC"/>

    <!-- Client Info Card -->
    <rect x="232" y="289" width="464" height="140" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="256" y="313" width="140" height="16" rx="4" fill="#E2E8F0"/>
    <rect x="256" y="345" width="416" height="32" rx="6" fill="#F8FAFC"/>
    <rect x="256" y="385" width="416" height="24" rx="4" fill="#F8FAFC"/>

    <!-- Items Table Card -->
    <rect x="232" y="445" width="464" height="180" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="256" y="469" width="100" height="16" rx="4" fill="#E2E8F0"/>
    <rect x="256" y="501" width="416" height="48" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="256" y="557" width="416" height="48" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Live Preview Sidebar -->
    <rect x="712" y="122" width="288" height="508" fill="#F8FAFC"/>
    <line x1="712" y1="122" x2="712" y2="630" stroke="#E2E8F0" stroke-width="1"/>
    
    <!-- Paper inside preview -->
    <rect x="744" y="154" width="224" height="320" rx="4" fill="#FFFFFF" filter="url(#shadow)"/>
    
    <!-- Preview Paper Details -->
    <!-- Logo inside paper -->
    <rect x="760" y="174" width="24" height="24" rx="4" fill="#E2E8F0"/>
    <rect x="912" y="174" width="40" height="8" rx="2" fill="#CBD5E1"/>
    <rect x="912" y="186" width="30" height="6" rx="2" fill="#E2E8F0"/>
    
    <rect x="760" y="214" width="192" height="1" fill="#E2E8F0"/>
    
    <!-- Paper Items -->
    <rect x="760" y="230" width="80" height="6" rx="2" fill="#CBD5E1"/>
    <rect x="760" y="242" width="60" height="6" rx="2" fill="#E2E8F0"/>
    
    <rect x="760" y="270" width="192" height="16" rx="2" fill="#F1F5F9"/>
    <rect x="760" y="290" width="192" height="16" rx="2" fill="#F8FAFC"/>
    <rect x="760" y="310" width="192" height="16" rx="2" fill="#F1F5F9"/>
    
    <!-- Paper Total -->
    <rect x="890" y="340" width="62" height="16" rx="2" fill="#2563EB"/>
