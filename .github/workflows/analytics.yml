name: Invoice-Gen Analytics Engine

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual triggering

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Analytics Engine
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          CLARITY_API_KEY: ${{ secrets.CLARITY_API_KEY }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
        run: npm run analytics

      - name: Upload Analytics Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-analytics-report
          path: analytics_reports/
          retention-days: 90
