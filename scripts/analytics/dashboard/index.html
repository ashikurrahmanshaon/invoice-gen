<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice-Gen.net Local Analytics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFCFF;
      --text: #0F172A;
      --border: #E2E8F0;
      --primary: #155EEF;
      --card-bg: #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 40px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .header h1 { margin: 0; font-size: 24px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }
    .card h3 {
      margin: 0 0 16px 0;
      font-size: 14px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }
    .insights {
      background: #EFF4FF;
      border: 1px solid #D1E0FF;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 40px;
    }
    .insights h2 { margin-top: 0; color: #155EEF; font-size: 18px; }
    .insights ul { margin: 0; padding-left: 20px; line-height: 1.6; }
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Invoice-Gen.net Analytics</h1>
    <span id="timestamp" style="color: #475569; font-size: 14px;"></span>
  </div>

  <div class="insights">
    <h2>🧠 AI Insights</h2>
    <ul id="insights-list">Loading...</ul>
  </div>

  <div class="grid">
    <div class="card"><h3>Clicks</h3><div class="value" id="val-clicks">-</div></div>
    <div class="card"><h3>Impressions</h3><div class="value" id="val-impressions">-</div></div>
    <div class="card"><h3>CTR</h3><div class="value" id="val-ctr">-</div></div>
    <div class="card"><h3>Avg Position</h3><div class="value" id="val-position">-</div></div>
    <div class="card"><h3>Active Users</h3><div class="value" id="val-users">-</div></div>
    <div class="card"><h3>Funnel Completion</h3><div class="value" id="val-funnel">-</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-container">
      <canvas id="queriesChart"></canvas>
    </div>
    <div class="chart-container">
      <canvas id="pagesChart"></canvas>
    </div>
  </div>

  <script>
    async function init() {
      try {
        const res = await fetch('../../analytics_reports/latest_data.json');
        const data = await res.json();

        document.getElementById('timestamp').innerText = `Report Date: ${data.timestamp.split('T')[0]}`;
        
        // Populate Insights
        const list = document.getElementById('insights-list');
        list.innerHTML = data.insights.map(i => `<li>${i}</li>`).join('');

        // Populate Cards
        document.getElementById('val-clicks').innerText = data.gsc.seoMetrics.clicks.toLocaleString();
        document.getElementById('val-impressions').innerText = data.gsc.seoMetrics.impressions.toLocaleString();
        document.getElementById('val-ctr').innerText = data.gsc.seoMetrics.ctr + '%';
        document.getElementById('val-position').innerText = data.gsc.seoMetrics.avgPosition;
        document.getElementById('val-users').innerText = data.ga4.traffic.users.toLocaleString();
        document.getElementById('val-funnel').innerText = data.ga4.events.funnelCompletion + '%';

        // Render Charts
        new Chart(document.getElementById('queriesChart'), {
          type: 'bar',
          data: {
            labels: data.gsc.topQueries.map(q => q.query),
            datasets: [{
              label: 'Clicks',
              data: data.gsc.topQueries.map(q => q.clicks),
              backgroundColor: '#155EEF'
            }]
          },
          options: { responsive: true, plugins: { title: { display: true, text: 'Top Queries (Clicks)' } } }
        });

        new Chart(document.getElementById('pagesChart'), {
          type: 'bar',
          data: {
            labels: data.gsc.topPages.map(p => p.url),
            datasets: [{
              label: 'Clicks',
              data: data.gsc.topPages.map(p => p.clicks),
              backgroundColor: '#27C93F'
            }]
          },
          options: { responsive: true, plugins: { title: { display: true, text: 'Top Landing Pages' } } }
        });

      } catch (err) {
        console.error(err);
        document.getElementById('insights-list').innerHTML = `<li style="color:red">Failed to load latest_data.json. Run "npm run analytics" first.</li>`;
      }
    }
    init();
  </script>
</body>
</html>
